# Workspace adapter folders under packages/adapter-* publish as @openzeppelin/adapter-*.
packages:
  # Include all packages in the packages directory
  - 'packages/*'
  # Adapter packages now live in the extracted openzeppelin-adapters repo.
  - '!packages/adapter-*'
  # Include all apps in the apps directory
  - 'apps/*'
  # Exclude any node_modules directories
  - '!**/node_modules/**'
