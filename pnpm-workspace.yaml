# Workspace adapter folders under packages/adapter-* publish as @openzeppelin/adapter-*.
packages:
  # Include all packages in the packages directory
  - 'packages/*'
  # Adapter packages now live in the extracted openzeppelin-adapters repo.
  - '!packages/adapter-*'
  # Include all apps in the apps directory
  - 'apps/*'
  # Exclude any node_modules directories
  - '!**/node_modules/**'
allowBuilds:
  '@openzeppelin/adapter-stellar': true
  '@swc/core': true
  bigint-buffer: true
  blake-hash: true
  bufferutil: true
  classic-level: true
  esbuild: true
  keccak: true
  protobufjs: true
  secp256k1: true
  tiny-secp256k1: true
  unrs-resolver: true
  usb: true
  utf-8-validate: true
